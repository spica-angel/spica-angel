<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>星鏡スピカ</title>

<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Zen Old Mincho',serif;
color:white;
text-align:center;

background:
linear-gradient(
rgba(10,5,35,.25),
rgba(35,15,70,.45)
),
url('F86F91D5-5636-4D37-A123-309F41103E65.png');

background-size:cover;
background-position:center top;
background-repeat:no-repeat;
background-attachment:fixed;
background-color:#180933;
}

.container{
width:90%;
max-width:900px;
margin:auto;
padding:40px 0 80px;
}

.hero-img{
width:90%;
max-width:520px;
display:block;
margin:0 auto;

filter:
drop-shadow(0 0 30px rgba(255,220,255,.8))
drop-shadow(0 0 60px rgba(220,184,255,.5));

animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}

.agency{
margin-top:20px;
font-size:.9rem;
letter-spacing:4px;
color:#f0d6ff;
}

h1{
font-size:4rem;
margin-top:15px;
text-shadow:0 0 30px #dcb8ff;
}

.english{
letter-spacing:8px;
margin-top:10px;
opacity:.85;
}

.star{
font-size:3rem;
margin:35px 0;
color:#f0d6ff;
text-shadow:0 0 25px #e8c6ff;
}

.welcome{
font-size:1.3rem;
line-height:2;
margin-bottom:70px;
}

.line{
width:60%;
height:1px;
background:rgba(255,255,255,.2);
margin:60px auto;
}

.section{
margin:80px 0;
}

.section h2{
font-size:3rem;
margin-bottom:40px;
text-shadow:0 0 20px #dcb8ff;
}

.profile{
font-size:1.15rem;
line-height:2.5;
}

.music-box{
margin:70px auto;
}

#musicBtn{
padding:20px 45px;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.2);

border-radius:999px;

color:white;
font-size:1rem;
font-family:'Zen Old Mincho',serif;

backdrop-filter:blur(15px);

box-shadow:
0 0 30px rgba(220,184,255,.4);

cursor:pointer;

transition:.3s;
}

#musicBtn:hover{
transform:translateY(-4px);

box-shadow:
0 0 40px rgba(220,184,255,.8);
}

.link-btn{
display:block;

width:100%;
max-width:700px;

margin:22px auto;
padding:24px;

text-decoration:none;
color:white;
font-size:1.3rem;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.18);

border-radius:999px;

backdrop-filter:blur(15px);

box-shadow:
0 0 25px rgba(180,120,255,.25);

transition:.3s;
}

.link-btn:hover{
transform:translateY(-4px);

background:rgba(180,120,255,.2);

box-shadow:
0 0 40px rgba(220,184,255,.6);
}

.footer{
margin-top:90px;
opacity:.6;
}

@media(max-width:768px){

h1{
font-size:2.8rem;
}

.section h2{
font-size:2rem;
}

.profile{
font-size:1rem;
line-height:2.2;
}

}

</style>
</head>

<body>

<div class="container">

<img class="hero-img" src="IMG_5845.png">

<div class="agency">
✦ LOCUS MEUS 所属 ✦
</div>

<h1>星鏡スピカ</h1>

<div class="english">
HOSHIGANE SPICA
</div>

<div class="star">✦</div>

<div class="welcome">
ちょい悪天使VTuber<br>
ラムズのみんな、ようこそ
</div>

<div class="section">

<h2>PROFILE</h2>

<div class="profile">

配信・歌・ゲーム・雑談を中心に活動中。<br><br>

少し意地悪で、少し甘やかす。<br><br>

そんな「ちょい悪天使VTuber」<br>
星鏡スピカです。

</div>

</div>

<div class="line"></div>

<div class="music-box">

<button id="musicBtn" onclick="toggleMusic()">
✦ 星空BGMを聴く ✦
</button>

<audio id="bgm" loop preload="auto">
<source src="bgm.mp3" type="audio/mpeg">
</audio>

</div>

<div class="line"></div>

<div class="section">

<h2>LINK</h2>

<a class="link-btn" href="https://youtube.com/@spica_hoshigane" target="_blank">
▶ YouTube
</a>

<a class="link-btn" href="https://web.iriam.app/s/user/QAHoReYrJj?uuid=af8f1df2" target="_blank">
🎤 IRIAM
</a>

<a class="link-btn" href="https://x.com/hoshigane_spica" target="_blank">
✦ X
</a>

<a class="link-btn" href="https://www.tiktok.com/@hoshigane_spica" target="_blank">
🎵 TikTok
</a>

<a class="link-btn" href="https://hoshiganespica.booth.pm/" target="_blank">
🛍 BOOTH
</a>

<a class="link-btn" href="https://marshmallow-qa.com/wcor8kzzwjwskmo" target="_blank">
💌 Marshmallow
</a>

</div>

<div class="footer">
© Hoshigane Spica
</div>

</div>

<script>

const bgm = document.getElementById("bgm");
const btn = document.getElementById("musicBtn");

function toggleMusic(){

if(bgm.paused){

bgm.play();

btn.innerHTML = "✦ BGM停止 ✦";

}else{

bgm.pause();

btn.innerHTML = "✦ 星空BGMを聴く ✦";

}

}

</script>

</body>
</html>
