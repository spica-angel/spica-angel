<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>星鏡スピカ</title>

<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:'Zen Old Mincho',serif;
color:white;
text-align:center;
overflow-x:hidden;
background-color:#17092f;

}

/* スマホ背景 */

@media(max-width:768px){

body{

background:
linear-gradient(
rgba(10,5,30,.25),
rgba(40,20,80,.45)
),
url('EE552393-4A35-41CD-9C75-CDD9386DEA1C.png');

background-size:cover;
background-position:center top;
background-repeat:no-repeat;
background-attachment:fixed;

}

}

/* PC背景 */

@media(min-width:769px){

body{

background:
linear-gradient(
rgba(10,5,30,.15),
rgba(40,20,80,.35)
),
url('4CDB24F9-160D-43C4-B7E4-F9BCB2CE237A.png');

background-size:cover;
background-position:center center;
background-repeat:no-repeat;
background-attachment:fixed;

}

}

.container{

width:92%;
max-width:1100px;
margin:auto;
padding:40px 0 80px;

}

.hero-img{

width:95%;
max-width:620px;

display:block;
margin:auto;

filter:
drop-shadow(0 0 40px rgba(255,255,255,.9))
drop-shadow(0 0 120px rgba(220,184,255,.8));

animation:float 4s ease-in-out infinite;

}

@keyframes float{

0%,100%{
transform:translateY(0px);
}

50%{
transform:translateY(-14px);
}

}

.agency{

margin-top:15px;

font-size:1rem;

letter-spacing:6px;

color:#f7dfff;

text-shadow:
0 0 10px #fff,
0 0 25px #dcb8ff;

}

h1{

font-size:4.8rem;

margin-top:20px;

text-shadow:
0 0 15px #fff,
0 0 35px #dcb8ff,
0 0 60px #dcb8ff;

animation:titleGlow 4s infinite;

}

@keyframes titleGlow{

0%,100%{
opacity:1;
}

50%{
opacity:.8;
}

}

.english{

letter-spacing:10px;
font-size:1.1rem;
margin-top:15px;
opacity:.9;

}

.star{

font-size:4rem;

margin:40px 0;

text-shadow:
0 0 20px #fff,
0 0 50px #dcb8ff;

animation:twinkle 3s infinite;

}

@keyframes twinkle{

0%,100%{
transform:scale(1);
}

50%{
transform:scale(1.15);
}

}

.welcome{

font-size:1.5rem;
line-height:2;
margin-bottom:70px;

}

.section{

background:rgba(120,80,200,.15);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.12);

border-radius:40px;

padding:60px 30px;

margin:70px auto;

box-shadow:
0 0 45px rgba(220,184,255,.15);

}

.section h2{

font-size:3rem;

margin-bottom:40px;

text-shadow:
0 0 15px #fff,
0 0 35px #dcb8ff;

}

.profile{

font-size:1.2rem;
line-height:2.8;

}

.music-box{

margin:50px auto;

}

#musicBtn{

padding:24px 65px;

font-size:1.2rem;

font-family:'Zen Old Mincho',serif;

color:white;

background:rgba(130,90,220,.35);

border:1px solid rgba(255,255,255,.15);

border-radius:999px;

backdrop-filter:blur(15px);

box-shadow:
0 0 40px rgba(220,184,255,.45);

cursor:pointer;

transition:.3s;

}

#musicBtn:hover{

transform:translateY(-5px);

box-shadow:
0 0 60px rgba(220,184,255,.8);

}
.link-btn{

display:block;

max-width:700px;

margin:22px auto;

padding:28px;

text-decoration:none;

color:white;

font-size:1.35rem;

background:rgba(150,100,255,.22);

border:1px solid rgba(255,255,255,.15);

border-radius:999px;

backdrop-filter:blur(18px);

transition:.3s;

}

.link-btn:hover{

transform:translateY(-5px);

background:rgba(180,120,255,.35);

box-shadow:
0 0 45px rgba(220,184,255,.5);

}

.footer{

margin-top:80px;

padding-bottom:40px;

opacity:.75;

}

@media(max-width:768px){

h1{
font-size:3.8rem;
}

.section h2{
font-size:2.3rem;
}

.profile{
font-size:1rem;
line-height:2.4;
}

.welcome{
font-size:1.25rem;
}

}

</style>

</head>

<body>

<div class="container">

<img class="hero-img" src="IMG_5845.png">

<div class="agency">
✦ LOCUS MEUS 所属 ✦
</div>

<h1>星鏡スピカ</h1>

<div class="english">
HOSHIGANE SPICA
</div>

<div class="star">✦</div>

<div class="welcome">
ちょい悪天使VTuber<br>
ラムズのみんな、ようこそ
</div>

<div class="section">

<h2>PROFILE</h2>

<div class="profile">

夜空に迷い込んだラムズを導く。<br><br>

少し意地悪で、少し甘やかす。<br><br>

歌、雑談、ゲーム配信を中心に活動する。<br><br>

ちょい悪天使VTuber<br>
星鏡スピカです。

</div>

</div>

<div class="music-box">

<button id="musicBtn" onclick="toggleMusic()">
✦ STARLIGHT MUSIC ✦
</button>

<audio id="bgm" loop>
<source src="bgm.mp3" type="audio/mpeg">
</audio>

</div>

<div class="section">

<h2>LINK</h2>

<a class="link-btn"
href="https://youtube.com/@spica_hoshigane"
target="_blank">
▶ YouTube
</a>

<a class="link-btn"
href="https://web.iriam.app/s/user/QAHoReYrJj?uuid=af8f1df2"
target="_blank">
🎤 IRIAM
</a>

<a class="link-btn"
href="https://x.com/hoshigane_spica"
target="_blank">
✦ X
</a>

<a class="link-btn"
href="https://www.tiktok.com/@hoshigane_spica"
target="_blank">
🎵 TikTok
</a>

<a class="link-btn"
href="https://hoshiganespica.booth.pm/"
target="_blank">
🛍 BOOTH
</a>

<a class="link-btn"
href="https://marshmallow-qa.com/wcor8kzzwjwskmo"
target="_blank">
💌 Marshmallow
</a>

</div>

<div class="footer">
© Hoshigane Spica
</div>

</div>

<script>

const bgm =
document.getElementById('bgm');

const btn =
document.getElementById('musicBtn');

function toggleMusic(){

if(bgm.paused){

bgm.play();

btn.innerHTML =
'✦ MUSIC STOP ✦';

}else{

bgm.pause();

btn.innerHTML =
'✦ STARLIGHT MUSIC ✦';

}

}

</script>

</body>
</html>
